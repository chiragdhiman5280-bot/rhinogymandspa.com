<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>Rhino Admin Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
</head>

<body>

<div class="dashboard">

<!-- Sidebar -->
<div class="sidebar">

<h2>RHINO</h2>

<ul>
<li>Dashboard</li>
<li>Offers</li>
<li>Pricing</li>
<li>Members</li>
<li>Settings</li>
</ul>

<button class="logout-btn" onclick="logout()">Logout</button>

</div>

<!-- Main -->
<div class="main">

<h1>Welcome Admin</h1>

<div class="panel">
<h2>Update Offer</h2>
<input type="text" id="offer" placeholder="Enter Offer">
<button onclick="saveOffer()">Save Offer</button>
</div>

<div class="panel">
<h2>Update Price</h2>
<input type="text" id="price" placeholder="Enter Price">
<button onclick="savePrice()">Save Price</button>
</div>

<div class="panel">
<h2>Update Loader</h2>

<input type="text" id="loaderTitle" placeholder="Loader Title">

<input type="text" id="loaderText" placeholder="Loader Subtitle">

<input type="text" id="loaderButton" placeholder="Loader Button Text">
<button onclick="saveLoader()">Save Loader</button>
<inpucxt type="text" id="memberCount" placeholder="Enter Member Count">
<button onclick="saveMemberCount()">Save Member Count</button>
</div>
<div class="panel">

<h2>Membership Leads</h2>

<div id="leads-list">
Loading leads...
</div>

</div>

<p id="msg"></p>

<button class="logout-btn" onclick="logout()">Logout</button>

</div>
<script type="module" src="dashboard.js"></script>
